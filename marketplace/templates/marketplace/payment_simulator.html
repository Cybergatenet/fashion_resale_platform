{% extends 'marketplace/base.html' %}
{% block content %}
<h2 class="text-2xl mb-4">Simulate Payment</h2>
<p>Order: {{ order.order_reference }}</p>
<p>Total: ${{ order.total_amount }}</p>
<p class="mb-4 text-gray-600">In production, this would connect to a real payment gateway.</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded">Simulate Successful Payment</button>
</form>
{% endblock %}
